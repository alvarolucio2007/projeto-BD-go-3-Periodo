syntax = "proto3";
package projeto;

import "google/protobuf/empty.proto";

option go_package = "github.com/alvarolucio2007/projeto-BD-go-3-Periodo/src/proto";

//USUÁRIO
message Usuario {
  uint32 id = 1;
  string username = 2;
  string password = 3;
  string role = 4;
}
message UsuarioLoginRequest {
  string username = 1;
  string password = 2;
}
message UsuarioLoginResponse {
  bool status = 1;
  string mensagem = 2;
  string role = 3;
}
message UsuarioCreateRequest {
  string username = 1;
  string password = 2;
  string role = 3;
}
message UsuarioCreateResponse {
  uint32 id = 1;
}
message UsuarioReadRequest {
  string nome = 1;
}
message UsuarioReadResponse {
  repeated Usuario usuarios = 1;
}
message UsuarioUpdateRequest {
  uint32 id = 1;
  string username = 2;
  string password = 3;
  string role = 4;
}
message UsuarioDeleteRequest {
  uint32 id = 1;
}
service UsuariosService {
  //Criar usuário
  rpc Create(UsuarioCreateRequest) returns (UsuarioCreateResponse);
  //Ler usuário
  rpc Read(UsuarioReadRequest) returns (UsuarioReadResponse);
  rpc ReadAll(google.protobuf.Empty) returns (UsuarioReadResponse);
  //Atualizar usuário
  rpc Update(UsuarioUpdateRequest) returns (google.protobuf.Empty);
  //Deletar usuário
  rpc Delete(UsuarioDeleteRequest) returns (google.protobuf.Empty);
  //Autenticar usuário
  rpc Auth(UsuarioLoginRequest) returns (UsuarioLoginResponse);
}
