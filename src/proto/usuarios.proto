syntax = "proto3";
package projeto;

option go_package = "github.com/alvarolucio2007/projeto-BD-go-3-Periodo/src/proto";

//USUÁRIO
message Usuario {
  uint32 id = 1;
  string username = 2;
  string password = 3;
  string role = 4;
}
message UsuarioLoginRequest {
  string username = 1;
  string password = 2;
}
message UsuarioLoginResponse {
  bool status = 1;
  string mensagem = 2;
}
message UsuarioCreateRequest {
  string username = 1;
  string password = 2;
  string role = 4;
}
message UsuarioReadRequest {
  uint32 id = 1;
}
message UsuarioUpdateRequest {
  string username = 1;
  string password = 2;
  string role = 4;
}
message UsuarioDeleteRequest {
  uint32 id = 1;
}
message Response {
  uint32 status_code = 1; //Usar os status codes do http (200,202,404, etc)
  string message = 2; //Caso tenha erro, enviar o erro aqui
}
service UsuariosService {
  //Criar usuário
  rpc Create(UsuarioCreateRequest) returns (Response);
  //Ler usuário
  rpc Read(UsuarioReadRequest) returns (Usuario);
  //Atualizar usuário
  rpc Update(UsuarioUpdateRequest) returns (Response);
  //Deletar usuário
  rpc Delete(UsuarioDeleteRequest) returns (Response);
  //Autenticar usuário
  rpc Auth(UsuarioLoginRequest) returns (UsuarioLoginResponse);
}
