syntax = "proto3";
package projeto;

option go_package = "github.com/alvarolucio2007/projeto-BD-go-3-Periodo/src/proto";

//USUÁRIO
message Usuario {
  int32 id = 1;
  string username = 2;
  string password = 3;
  string role = 4;
}
message UsuarioCreateRequest {
  string username = 1;
  string password = 2;
  string role = 4;
}
message UsuarioReadRequest {
  int32 id = 1;
}
message UsuarioGivePasswordRequest {
  string username = 1;
}
message UsuarioGivePasswordResponse {
  string password = 1;
}
message UsuarioUpdateRequest {
  string username = 1;
  string password = 2;
  string role = 4;
}
message UsuarioDeleteRequest {
  int32 id = 1;
}
message Response {
  int32 status_code = 1; //Usar os status codes do http (200,202,404, etc)
  string message = 2; //Caso tenha erro, enviar o erro aqui
}
service UsuariosService {
  //Criar usuário
  rpc Create(UsuarioCreateRequest) returns (Response);
  //Ler usuário
  rpc Read(UsuarioReadRequest) returns (Usuario);
  //Atualizar usuário
  rpc Update(UsuarioUpdateRequest) returns (Response);
  //Deletar usuário
  rpc Delete(UsuarioDeleteRequest) returns (Response);
  //Minha vigarície...
  rpc GivePassword(UsuarioGivePasswordRequest) returns (UsuarioGivePasswordResponse);
}
