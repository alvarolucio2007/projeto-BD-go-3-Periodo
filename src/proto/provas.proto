syntax = "proto3";
package projeto;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/alvarolucio2007/projeto-BD-go-3-Periodo/src/proto";

// PROVA
message Prova {
  int32 id = 1;
  string nome_prova = 2;
  string turma_prova = 3;
  string materia_prova = 4;
  google.protobuf.Timestamp data_prova = 5;
}
message ProvaLista {
  repeated Prova provas = 1;
}
message CreateProvaRequest {
  string nome_prova = 1;
  string turma_prova = 2;
  string materia_prova = 3;
  google.protobuf.Timestamp data_prova = 4;
}
message CreateProvaResponse {
  uint32 id_prova = 1;
}
message ReadProvaRequest {
  string nome_prova = 1;
}
message UpdateProvaRequest {
  uint32 id = 1;
  string novo_nome = 2;
  string nova_turma = 3;
  google.protobuf.Timestamp data_prova = 4;
}
message DeleteProvaRequest {
  uint32 id = 1;
}
service ProvaService {
  //Criar prova
  rpc Create(CreateProvaRequest) returns (CreateProvaResponse);
  //Ler prova (tanto pesquisar quanto listar todas)
  rpc ReadAll(google.protobuf.Empty) returns (ProvaLista);
  rpc Read(ReadProvaRequest) returns (ProvaLista);
  //Atualizar prova
  rpc Update(UpdateProvaRequest) returns (Prova);
  //Deletar prova
  rpc Delete(DeleteProvaRequest) returns (google.protobuf.Empty);
}
