syntax = "proto3";
package projeto;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/alvarolucio2007/projeto-BD-go-3-Periodo/src/proto";
message LeftJoin {
  string username = 1;
  optional string nome_prova = 2;
  optional float nota_prova = 3;
  google.protobuf.Timestamp data_prova = 4;
}
message LeftJoinResponse {
  repeated LeftJoin resultado = 1;
}
service LeftJoinService {
  rpc LeftJoin(google.protobuf.Empty) returns (LeftJoinResponse);
}
