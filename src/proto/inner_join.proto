syntax = "proto3";
package projeto;

import "google/protobuf/empty.proto";
import "provas.proto";
import "usuarios.proto";

option go_package = "github.com/alvarolucio2007/projeto-BD-go-3-Periodo/src/proto";
message InnerJoinResponse {
  string username = 1;
  string nome_prova = 2;
  float nota_prova = 3;
}
service InnerJoinService {
  rpc InnerJoin(google.protobuf.Empty) returns (stream InnerJoinResponse);
}
