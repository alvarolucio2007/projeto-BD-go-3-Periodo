syntax = "proto3";
package projeto;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/alvarolucio2007/projeto-BD-go-3-Periodo/src/proto";
message NotaDetalhada {
  string username = 1;
  string nome_prova = 2;
  float nota_prova = 3;
  google.protobuf.Timestamp data_prova = 4;
}
message InnerJoinResponse {
  repeated NotaDetalhada itens = 1;
}
service InnerJoinService {
  rpc InnerJoin(google.protobuf.Empty) returns (InnerJoinResponse);
}
